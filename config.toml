# Research Swarm Configuration

[swarm]
max_rounds = 1                # phases are sequential, not iterative
default_model = "sonnet"

# Agent roster — which agents to spawn per phase.
# Ablation study (12 runs, 4 configs, 3 topics) showed 8 agents match
# 14-agent quality (6.1 vs 5.9) with higher actionability (5.3 vs 4.3).
# All prompts preserved in agents.py for future use.
[swarm.roster]
scouts = ["arxiv-scout", "impl-scout"]
researchers = ["arch-researcher", "prompt-researcher"]
applied = ["experiment-designer"]
# critic, judge, synthesizer always included (core pipeline)

[timeouts]
scout = 180                   # bumped from 120 — web search adds latency
researcher = 180
applied = 240
quality = 120
synthesizer = 240

[models]
scout = "haiku"
researcher = "sonnet"
applied = "sonnet"
critic = "sonnet"
judge = "opus"
synthesizer = "opus"

[context]
# Token budgets per model (in chars, ~4 chars/token).
# Agents get at most this much injected context; rest reserved for reasoning.
haiku_budget = 30000        # ~7.5K tokens — fast scouts
sonnet_budget = 50000       # ~12.5K tokens — researchers/applied
opus_budget = 80000         # ~20K tokens — synthesis/judge

# Role-specific budget overrides (chars). Takes precedence over model budget.
# Scouts need less (fast discovery), critic needs more (full evidence review).
[context.role_budgets]
scout = 20000               # scouts do discovery, not deep analysis
researcher = 50000          # researchers need full scout context
applied = 40000             # applied agents get pre-summarized research
critic = 60000              # critic needs full evidence to verify claims
judge = 70000               # judge reviews everything
synthesizer = 80000         # synthesizer integrates all phases

[memory]
db_path = "memory.db"
decay_lambda = 0.01              # exponential decay: score *= exp(-lambda * hours)
promotion_threshold = 5          # compress insights into meta-insight after this many related
max_technique_age_days = 90      # deprioritize untouched techniques older than this

[output]
dir = "./output"
log_file = "research-log.tsv"

[quality]
min_actionability = 6         # 0-10, below this = discard
dedup_threshold = 0.39        # empirically tuned; 0.50 caused overlap=1.0 on some topics
